<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>七夕の夜</title>
  <style>
    :root {
      --ink: #f3efe2;
      --muted: rgba(243, 239, 226, .72);
      --paper: #fff7df;
      --bamboo: #8fb66e;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      color: var(--ink);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
      background: #060913;
    }
    #scene {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .vignette {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 42%, transparent 0 43%, rgba(0,0,0,.18) 70%, rgba(0,0,0,.54) 100%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.18));
      mix-blend-mode: multiply;
    }
    .paper-grain {
      pointer-events: none;
      position: fixed;
      inset: -40px;
      opacity: .07;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,.7) 0 1px, transparent 1px 5px),
        repeating-linear-gradient(90deg, rgba(255,255,255,.5) 0 1px, transparent 1px 7px);
      filter: blur(.25px);
      transform: rotate(-1.4deg) scale(1.05);
    }
    .copy {
      position: fixed;
      left: clamp(22px, 5vw, 70px);
      top: clamp(28px, 7vh, 80px);
      max-width: 430px;
      z-index: 2;
      text-shadow: 0 2px 18px rgba(3,6,16,.55);
    }
    .copy .date {
      letter-spacing: .28em;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    h1 {
      margin: 0;
      font-weight: 500;
      font-size: clamp(44px, 8vw, 92px);
      line-height: .98;
      letter-spacing: .08em;
    }
    .copy p {
      margin: 22px 0 0;
      font-size: clamp(14px, 1.55vw, 18px);
      line-height: 2;
      color: var(--muted);
      letter-spacing: .08em;
    }

    .wish-panel {
      position: fixed;
      left: clamp(22px, 5vw, 70px);
      bottom: clamp(22px, 6vh, 64px);
      z-index: 3;
      width: min(420px, calc(100vw - 44px));
      padding: 16px 16px 14px;
      border: 1px solid rgba(255, 247, 223, .18);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(9,14,32,.58), rgba(6,9,19,.38));
      box-shadow: 0 20px 70px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter: blur(14px) saturate(120%);
    }
    .wish-panel label {
      display: block;
      margin: 0 0 10px;
      color: rgba(243,239,226,.76);
      font: 12px/1.7 "Hiragino Sans", "Noto Sans JP", sans-serif;
      letter-spacing: .13em;
    }
    .wish-row {
      display: flex;
      gap: 9px;
      align-items: stretch;
    }
    .wish-panel input {
      min-width: 0;
      flex: 1;
      appearance: none;
      border: 1px solid rgba(255,247,223,.22);
      border-radius: 999px;
      padding: 12px 15px;
      color: #2d2418;
      background: rgba(255,247,223,.88);
      outline: none;
      font: 16px/1.2 "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
      box-shadow: inset 0 1px 4px rgba(60,40,20,.12);
    }
    .wish-panel input::placeholder { color: rgba(65,48,31,.45); }
    .wish-panel input:focus { border-color: rgba(255,232,164,.85); box-shadow: 0 0 0 3px rgba(255,232,164,.14), inset 0 1px 4px rgba(60,40,20,.12); }
    .wish-panel button {
      appearance: none;
      border: 1px solid rgba(255,247,223,.3);
      border-radius: 999px;
      padding: 0 18px;
      color: #fff7df;
      background: rgba(143,182,110,.34);
      cursor: pointer;
      font: 13px/1 "Hiragino Sans", "Noto Sans JP", sans-serif;
      letter-spacing: .12em;
      transition: transform .18s ease, background .18s ease;
    }
    .wish-panel button:hover { transform: translateY(-1px); background: rgba(143,182,110,.48); }
    .wish-note {
      margin-top: 9px;
      color: rgba(243,239,226,.45);
      font: 11px/1.7 "Hiragino Sans", "Noto Sans JP", sans-serif;
      letter-spacing: .06em;
    }
    .hint {
      position: fixed;
      right: 24px;
      bottom: 20px;
      z-index: 2;
      color: rgba(243,239,226,.56);
      font: 12px/1.6 "Hiragino Sans", "Noto Sans JP", sans-serif;
      letter-spacing: .12em;
      writing-mode: vertical-rl;
    }
    @media (max-width: 720px) {
      .copy {
        top: max(22px, env(safe-area-inset-top));
        left: 20px;
        right: 18px;
        transform: rotate(-.7deg);
      }
      .date { font-size: 11px; letter-spacing: .24em; }
      .copy h1 { margin-top: 8px; font-size: clamp(56px, 18vw, 92px); }
      .copy p {
        max-width: min(310px, 78vw);
        margin-top: 12px;
        font-size: 13px;
        line-height: 1.85;
        letter-spacing: .06em;
      }
      .hint { display: none; }
      .wish-panel {
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        width: auto;
        padding: 12px;
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(9,14,32,.70), rgba(6,9,19,.52));
      }
      .wish-panel label { margin-bottom: 8px; font-size: 11px; }
      .wish-row { gap: 7px; }
      .wish-panel input { padding: 12px 13px; }
      .wish-panel button {
        min-width: 64px;
        padding: 0 13px;
        font-size: 12px;
      }
      .wish-note { margin-top: 7px; font-size: 10px; }
    }
    @media (max-width: 390px) {
      .wish-row { flex-direction: column; }
      .wish-panel button { height: 42px; width: 100%; }
      .copy p { max-width: 255px; }
    }
    @media (max-height: 620px) and (max-width: 720px) {
      .copy p { display: none; }
      .wish-note { display: none; }
      .wish-panel { padding: 10px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .paper-grain { opacity: .16; }
      .wish-panel button { transition: none; }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <section class="copy" aria-label="Tanabata message">
    <div class="date">七月七日</div>
    <h1>七夕</h1>
    <p>笹の葉が夜風にゆれて、短冊の願いが星のあいだを静かに渡っていく。</p>
  </section>

  <form class="wish-panel" id="wishForm" autocomplete="off">
    <label for="wishInput">願いを短冊に書く</label>
    <div class="wish-row">
      <input id="wishInput" name="wish" maxlength="26" placeholder="例：すこやかな一年になりますように" />
      <button type="submit">飾る</button>
    </div>
    <div class="wish-note">書いた願いはこのブラウザにそっと残ります。</div>
  </form>
  <div class="hint">動かすと夜空が少し揺れます</div>
  <div class="vignette"></div>
  <div class="paper-grain"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.3/dist/esm/simplex-noise.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { createNoise3D } from 'simplex-noise';

    const canvas = document.querySelector('#scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x070b18, 0.027);

    const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 120);
    camera.position.set(0, 1.2, 18);

    const clock = new THREE.Clock();
    const noise3D = createNoise3D();
    const pointer = new THREE.Vector2(0, 0);
    const targetPointer = new THREE.Vector2(0, 0);
    const isCoarsePointer = matchMedia('(pointer: coarse)').matches;

    function layoutForViewport() {
      const mobile = innerWidth <= 720;
      const veryNarrow = innerWidth <= 390;
      renderer.setPixelRatio(Math.min(devicePixelRatio, mobile ? 1.55 : 2));
      camera.fov = mobile ? (veryNarrow ? 54 : 50) : 42;
      camera.position.z = mobile ? (veryNarrow ? 21.5 : 20) : 18;
      camera.updateProjectionMatrix();
      // On narrow screens the bamboo stems are modeled around x=6, so the group
      // must be shifted left. Otherwise the tags sit outside the camera frustum.
      bambooGroup.position.set(mobile ? (veryNarrow ? -3.95 : -3.55) : 1.4, mobile ? -.62 : .2, mobile ? .45 : 1.2);
      bambooGroup.scale.setScalar(mobile ? (veryNarrow ? .80 : .86) : 1);
      galaxy.position.y = mobile ? -1.0 : 0;
      moon.position.set(mobile ? -4.2 : -6.6, mobile ? 6.2 : 5.4, -10);
      moonGlow.position.copy(moon.position);
    }

    const sky = new THREE.Mesh(
      new THREE.SphereGeometry(58, 48, 48),
      new THREE.ShaderMaterial({
        side: THREE.BackSide,
        uniforms: { uTime: { value: 0 } },
        vertexShader: `varying vec3 vPos; void main(){ vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: `varying vec3 vPos; uniform float uTime;
          float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);} 
          float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);} 
          void main(){
            vec3 n = normalize(vPos);
            float h = clamp(n.y*.5+.5, 0.0, 1.0);
            vec3 top = vec3(0.015,0.026,0.075);
            vec3 low = vec3(0.035,0.055,0.12);
            vec3 col = mix(low, top, smoothstep(.18, .9, h));
            float cloud = noise(n.xz*4.0 + vec2(uTime*.008, -uTime*.004));
            col += vec3(0.018,0.025,0.05) * smoothstep(.55, .95, cloud) * (1.0-h)*.55;
            gl_FragColor = vec4(col,1.0);
          }`
      })
    );
    scene.add(sky);

    function makeStars(count, radius, size, color, spreadY = 1) {
      const positions = new Float32Array(count * 3);
      const scales = new Float32Array(count);
      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const y = (Math.random() * 2 - .75) * radius * spreadY;
        const r = Math.sqrt(Math.max(radius * radius - y * y, 0));
        positions[i*3] = Math.cos(theta) * r;
        positions[i*3+1] = y + 4;
        positions[i*3+2] = Math.sin(theta) * r;
        scales[i] = Math.random() * .75 + .25;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));
      const material = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        uniforms: { uTime: { value: 0 }, uSize: { value: size }, uColor: { value: new THREE.Color(color) } },
        vertexShader: `attribute float aScale; uniform float uSize; varying float vScale; void main(){ vScale=aScale; vec4 mv=modelViewMatrix*vec4(position,1.0); gl_PointSize=uSize*aScale*(16.0/-mv.z); gl_Position=projectionMatrix*mv; }`,
        fragmentShader: `uniform vec3 uColor; uniform float uTime; varying float vScale; void main(){ vec2 uv=gl_PointCoord-.5; float d=length(uv); float a=smoothstep(.5,.04,d); float tw=.78+.22*sin(uTime*(1.2+vScale*2.0)+vScale*24.0); gl_FragColor=vec4(uColor, a*tw); }`
      });
      const points = new THREE.Points(geometry, material);
      points.userData.material = material;
      return points;
    }
    const stars = makeStars(1800, 52, 1.55, 0xfff2c9, .7);
    const smallStars = makeStars(3200, 56, .75, 0xc8dcff, .8);
    scene.add(stars, smallStars);

    const galaxyCount = 2600;
    const gPos = new Float32Array(galaxyCount * 3);
    const gScale = new Float32Array(galaxyCount);
    for (let i = 0; i < galaxyCount; i++) {
      const t = Math.random();
      const x = (t - .5) * 64;
      const curve = Math.sin(t * Math.PI * 2.1 - .6) * 2.6;
      const band = (Math.random() + Math.random() - 1) * 2.4;
      gPos[i*3] = x;
      gPos[i*3+1] = 8.2 + curve + band;
      gPos[i*3+2] = -22 + (Math.random() - .5) * 9;
      gScale[i] = Math.random() * 1.6 + .25;
    }
    const galaxyGeo = new THREE.BufferGeometry();
    galaxyGeo.setAttribute('position', new THREE.BufferAttribute(gPos, 3));
    galaxyGeo.setAttribute('aScale', new THREE.BufferAttribute(gScale, 1));
    const galaxyMat = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
      uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0xbfd7ff) } },
      vertexShader: `attribute float aScale; varying float vScale; void main(){ vScale=aScale; vec4 mv=modelViewMatrix*vec4(position,1.0); gl_PointSize=(1.0+aScale*2.2)*(18.0/-mv.z); gl_Position=projectionMatrix*mv; }`,
      fragmentShader: `uniform vec3 uColor; varying float vScale; void main(){ vec2 uv=gl_PointCoord-.5; float d=length(uv); float a=smoothstep(.5,.0,d)*(.08+vScale*.08); gl_FragColor=vec4(uColor,a); }`
    });
    const galaxy = new THREE.Points(galaxyGeo, galaxyMat);
    galaxy.rotation.z = -.25;
    scene.add(galaxy);

    const bambooGroup = new THREE.Group();
    scene.add(bambooGroup);
    const bambooMat = new THREE.MeshStandardMaterial({ color: 0x6f9a5a, roughness: .9, metalness: 0 });
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x88b96b, roughness: .82, side: THREE.DoubleSide });
    const stringMat = new THREE.LineBasicMaterial({ color: 0xdbcfa9, transparent: true, opacity: .6 });
    const tagMats = [0xf5ddd0,0xf7edbd,0xd8e7c2,0xd2e3f3,0xe7d8f0].map(c => new THREE.MeshStandardMaterial({ color: c, roughness: .95, side: THREE.DoubleSide }));

    const wishForm = document.querySelector('#wishForm');
    const wishInput = document.querySelector('#wishInput');
    const savedWishes = JSON.parse(localStorage.getItem('tanabata-wishes') || '[]').slice(-12);
    const wishAnchors = [];
    const wishColors = ['#f6ddcd', '#f8efbf', '#dcebc8', '#d3e6f5', '#eadbf2', '#f1d4dc'];

    function wrapVerticalText(ctx, text, maxLines) {
      const chars = Array.from(text.replace(/\s+/g, ' ').trim());
      const lines = [];
      let line = [];
      for (const ch of chars) {
        line.push(ch);
        if (line.length >= 8) { lines.push(line); line = []; }
        if (lines.length >= maxLines) break;
      }
      if (line.length && lines.length < maxLines) lines.push(line);
      return lines;
    }

    function makeWishMaterial(text, color) {
      const c = document.createElement('canvas');
      c.width = 256;
      c.height = 768;
      const ctx = c.getContext('2d');
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.globalAlpha = .12;
      for (let y = 0; y < c.height; y += 9) {
        ctx.fillStyle = y % 18 ? '#ffffff' : '#6f5130';
        ctx.fillRect(0, y, c.width, 1);
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(90,58,35,.16)';
      ctx.fillRect(120, 34, 16, 42);
      ctx.strokeStyle = 'rgba(86,63,39,.18)';
      ctx.lineWidth = 2;
      ctx.strokeRect(18, 18, c.width - 36, c.height - 36);
      ctx.fillStyle = '#3b2d22';
      ctx.font = '500 34px "Yu Mincho", "Hiragino Mincho ProN", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const lines = wrapVerticalText(ctx, text, 3);
      const startX = 162 + (lines.length - 1) * 24;
      lines.forEach((line, li) => {
        const x = startX - li * 48;
        line.forEach((ch, i) => ctx.fillText(ch, x, 135 + i * 56));
      });
      ctx.fillStyle = 'rgba(92,58,31,.35)';
      ctx.font = '22px "Yu Mincho", serif';
      ctx.fillText('七夕', 48, 690);
      const texture = new THREE.CanvasTexture(c);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = 8;
      return new THREE.MeshStandardMaterial({ map: texture, roughness: .96, side: THREE.DoubleSide });
    }

    function addWishTag(text, fromStorage = false) {
      const clean = text.trim().slice(0, 26);
      if (!clean || wishAnchors.length === 0) return;
      const anchor = wishAnchors[Math.floor(Math.random() * wishAnchors.length)];
      const side = anchor.side;
      const tagGroup = new THREE.Group();
      const material = makeWishMaterial(clean, wishColors[Math.floor(Math.random() * wishColors.length)]);
      const tag = new THREE.Mesh(new THREE.PlaneGeometry(.62, 1.86, 1, 8), material);
      const line = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 1.05, 0), new THREE.Vector3(0, 1.48, 0)]),
        stringMat
      );
      tagGroup.add(tag, line);
      tagGroup.position.copy(anchor.position).add(new THREE.Vector3(side * (.22 + Math.random() * .16), -.18 - Math.random() * .28, .18 + Math.random() * .18));
      tagGroup.rotation.z = side * (.13 + Math.random() * .16);
      tagGroup.rotation.y = side * (.08 + Math.random() * .08);
      tagGroup.scale.setScalar(.001);
      tagGroup.userData.phase = Math.random() * 10;
      tagGroup.userData.isWish = true;
      tagGroup.userData.birth = clock.getElapsedTime();
      bambooGroup.add(tagGroup);
      if (!fromStorage) {
        savedWishes.push(clean);
        localStorage.setItem('tanabata-wishes', JSON.stringify(savedWishes.slice(-12)));
      }
    }

    function makeLeaf(len, width) {
      const shape = new THREE.Shape();
      shape.moveTo(0, 0);
      shape.quadraticCurveTo(width, len*.42, 0, len);
      shape.quadraticCurveTo(-width, len*.42, 0, 0);
      const geo = new THREE.ShapeGeometry(shape, 16);
      geo.translate(0, -len*.08, 0);
      return geo;
    }
    const leafGeo = makeLeaf(1.75, .22);
    const branchMat = new THREE.MeshStandardMaterial({ color: 0x759f5e, roughness: .86 });

    for (let s = 0; s < 5; s++) {
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(.055, .095, 13 + s * .9, 12), bambooMat);
      stem.position.set(6.2 + s*.55, -1.8 + s*.1, -1 - s*.3);
      stem.rotation.z = -.22 - s*.035;
      bambooGroup.add(stem);
      for (let j = 0; j < 11; j++) {
        const y = -6.2 + j * 1.22 + s*.18;
        const side = j % 2 ? 1 : -1;
        const branch = new THREE.Mesh(new THREE.CylinderGeometry(.018, .03, 3.0, 7), branchMat);
        branch.position.set(6.15 + s*.52 + side*.76, y, -1.4 - s*.25);
        branch.rotation.z = side * (1.12 + Math.random()*.22);
        branch.rotation.x = .18;
        bambooGroup.add(branch);
        if (j > 2 && j < 10) wishAnchors.push({ position: branch.position.clone().add(new THREE.Vector3(side*1.22, -.52, .18)), side });
        for (let k = 0; k < 5; k++) {
          const leaf = new THREE.Mesh(leafGeo, leafMat);
          leaf.position.set(branch.position.x + side*(.45 + k*.28), y + .15 + k*.18, branch.position.z + (Math.random()-.5)*.28);
          leaf.rotation.z = side * (.55 + Math.random()*.35);
          leaf.rotation.y = side * (Math.PI/2 + .25);
          leaf.rotation.x = (Math.random()-.5)*.4;
          leaf.scale.setScalar(.58 + Math.random()*.34);
          leaf.userData.phase = Math.random()*10;
          bambooGroup.add(leaf);
        }
        if (j > 2 && j < 10 && Math.random() > .34) {
          const tagGroup = new THREE.Group();
          const tag = new THREE.Mesh(new THREE.PlaneGeometry(.52, 1.55, 1, 4), tagMats[(j+s)%tagMats.length]);
          const line = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,.94,0), new THREE.Vector3(0,1.35,0)]),
            stringMat
          );
          tagGroup.add(tag, line);
          tagGroup.position.set(branch.position.x + side*1.5, y - .8, branch.position.z + .08);
          tagGroup.rotation.z = side * (.16 + Math.random()*.12);
          tagGroup.userData.phase = Math.random()*10;
          bambooGroup.add(tagGroup);
        }
      }
    }

    bambooGroup.position.set(1.4, .2, 1.2);
    bambooGroup.rotation.z = .04;


    if (savedWishes.length === 0) {
      ['よい出会いがありますように', '穏やかに過ごせますように', '星まで届きますように'].forEach(w => addWishTag(w, true));
    } else {
      savedWishes.forEach(w => addWishTag(w, true));
    }

    wishForm.addEventListener('submit', e => {
      e.preventDefault();
      const wish = wishInput.value.trim();
      if (!wish) return;
      addWishTag(wish);
      wishInput.value = '';
      wishInput.blur();
    });

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(90, 40), new THREE.MeshBasicMaterial({ color: 0x02040a, transparent: true, opacity: .26 }));
    ground.rotation.x = -Math.PI/2;
    ground.position.y = -7.6;
    scene.add(ground);

    const moon = new THREE.Mesh(
      new THREE.CircleGeometry(1.22, 80),
      new THREE.MeshBasicMaterial({ color: 0xffefd0, transparent: true, opacity: .82 })
    );
    moon.position.set(-6.6, 5.4, -10);
    scene.add(moon);
    const moonGlow = new THREE.Mesh(
      new THREE.CircleGeometry(3.3, 80),
      new THREE.MeshBasicMaterial({ color: 0xffdf9a, transparent: true, opacity: .055, blending: THREE.AdditiveBlending })
    );
    moonGlow.position.copy(moon.position);
    scene.add(moonGlow);
    layoutForViewport();

    const warmLight = new THREE.PointLight(0xffe7b5, 18, 35, 2);
    warmLight.position.set(-4, 5, 8);
    scene.add(warmLight);
    scene.add(new THREE.HemisphereLight(0x8fafdd, 0x253414, 1.2));

    function resize() {
      renderer.setSize(innerWidth, innerHeight);
      camera.aspect = innerWidth / innerHeight;
      layoutForViewport();
    }
    addEventListener('resize', resize);
    addEventListener('pointermove', e => {
      if (isCoarsePointer && e.pointerType === 'touch') return;
      targetPointer.x = (e.clientX / innerWidth - .5) * 2;
      targetPointer.y = (e.clientY / innerHeight - .5) * 2;
    }, { passive: true });

    function animate() {
      const t = clock.getElapsedTime();
      pointer.lerp(targetPointer, .035);
      sky.material.uniforms.uTime.value = t;
      stars.userData.material.uniforms.uTime.value = t;
      smallStars.userData.material.uniforms.uTime.value = t * .7;
      galaxyMat.uniforms.uTime.value = t;
      galaxy.rotation.z = -.25 + Math.sin(t*.035)*.018;
      galaxy.position.x = Math.sin(t*.06)*.12;
      bambooGroup.rotation.z = .035 + Math.sin(t*.7)*.012 + pointer.x*.018;
      bambooGroup.children.forEach((o, idx) => {
        if (o.userData.phase !== undefined) {
          const sway = Math.sin(t * (1.1 + (idx%3)*.08) + o.userData.phase) * .035;
          o.rotation.z += sway * .08;
          o.position.x += Math.sin(t*.8 + o.userData.phase) * .0009;
          if (o.userData.isWish) {
            const grow = Math.min(1, Math.max(0, (t - o.userData.birth) * 1.8));
            const eased = 1 - Math.pow(1 - grow, 3);
            o.scale.setScalar(.78 + eased * .22);
          }
        }
      });
      camera.position.x += ((pointer.x * .45) - camera.position.x) * .035;
      camera.position.y += ((1.2 - pointer.y * .22) - camera.position.y) * .035;
      camera.lookAt(0, .6, 0);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
